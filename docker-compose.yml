services:
  backend:
    build:
      context: .
      target: backend-runtime
    expose:
      - "8000"
    environment:
      WINDOW_ETERNITY_DATA_DIR: /app/data
      WINDOW_ETERNITY_PORT: "8000"
    volumes:
      - window_eternity_data:/app/data

  gateway:
    build:
      context: .
      target: nginx-gateway
    ports:
      - "3030:3030"
    depends_on:
      - backend

volumes:
  window_eternity_data:
